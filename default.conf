server {
    listen 5173;
    server_name localhost;

    # 前端静态文件
    root /usr/share/nginx/html;
    index index.html;
    error_page 404 /404.html;

    # 基础头部
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location = /404.html {
        internal;
    }

    location = /robots.txt {
        try_files /robots.txt =404;
        access_log off;
    }

    location = /llms.txt {
        try_files /llms.txt =404;
        access_log off;
    }

    location = /sitemap.xml {
        try_files /sitemap.xml =404;
        access_log off;
    }

    location = /sitemap_index.xml {
        try_files /sitemap_index.xml =404;
        access_log off;
    }

    location = /about {
        try_files /about/index.html =404;
    }

    location = /faq {
        try_files /faq/index.html =404;
    }

    location = /contact {
        try_files /contact/index.html =404;
    }

    location = /pricing {
        try_files /pricing/index.html =404;
    }

    location = /privacy {
        try_files /privacy/index.html =404;
    }

    location = /terms {
        try_files /terms/index.html =404;
    }

    # 禁止访问源代码映射文件（如果有的话）
    location ~ \.map$ {
        return 404;
    }

    # API 代理到后端（重要：这个配置要在 / 之前）
    location /api/ {
        proxy_pass http://127.0.0.1:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header Access-Control-Allow-Headers 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
        add_header Access-Control-Expose-Headers 'Content-Length,Content-Range' always;
    }

    # Linux DO Credit 异步回调（/credit/notify）代理到后端
    location /credit/ {
        proxy_pass http://127.0.0.1:3000/credit/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ZPAY 异步回调（/notify）代理到后端
    location /notify {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 首页和 SPA 路由
    location = / {
        try_files /index.html =404;
    }

    location = /buy {
        try_files /index.html =404;
    }

    location = /purchase {
        try_files /index.html =404;
    }

    location ~ ^/purchase/[^/]+$ {
        try_files /index.html =404;
    }

    location = /order {
        try_files /index.html =404;
    }

    location = /login {
        try_files /index.html =404;
    }

    location = /register {
        try_files /index.html =404;
    }

    location = /waiting-room {
        try_files /index.html =404;
    }

    location = /apple-showcase {
        try_files /index.html =404;
    }

    location ~ ^/redeem(?:/.*)?$ {
        try_files /index.html =404;
    }

    location ~ ^/feature-disabled(?:/.*)?$ {
        try_files /index.html =404;
    }

    location ~ ^/admin(?:/.*)?$ {
        try_files /index.html =404;
    }

    # 其余路径优先返回真实静态文件或静态目录，找不到则返回真实 404
    location / {
        try_files $uri $uri/ =404;
    }

    # 缓存静态资源
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webmanifest)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
